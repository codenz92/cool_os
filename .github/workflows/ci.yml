name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Rust toolchain
        run: rustup show

      - name: Format check
        run: cargo fmt --all --check

      - name: Headless boot smoke
        run: make smoke

      - name: Framebuffer UI smoke
        run: make smoke-ui

      - name: Framebuffer screendump assertion
        run: make smoke-framebuffer

      - name: UI screenshot golden smoke
        run: make smoke-ui-goldens

      - name: USB init smoke
        run: make smoke-usb-init

      - name: Kernel unit-style smoke
        run: make smoke-kernel-units

      - name: Boot budget smoke
        run: make smoke-boot-budget

      - name: QEMU matrix low memory
        run: make smoke-lowmem

      - name: QEMU matrix SMP groundwork
        run: make smoke-smp2

      - name: QEMU matrix alternate VGA
        run: make smoke-vga-cirrus

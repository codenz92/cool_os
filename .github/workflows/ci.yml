name: CI

on:
  push:
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust toolchain
        run: rustup show

      - name: Format check
        run: cargo fmt --all --check

  boot-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SMOKE_BOOT_BUDGET_SECONDS: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Rust toolchain
        run: rustup show

      - name: Headless boot smoke
        run: make smoke

      - name: Kernel unit-style smoke
        run: make smoke-kernel-units

      - name: Boot budget smoke
        run: make smoke-boot-budget

      - name: Upload smoke failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-smoke-artifacts
          path: target/smoke-artifacts/**
          if-no-files-found: ignore

  ui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SMOKE_FRAMEBUFFER_SECONDS: 18
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Rust toolchain
        run: rustup show

      - name: Framebuffer UI smoke
        run: make smoke-ui

      - name: Framebuffer screendump assertion
        run: make smoke-framebuffer

      - name: UI screenshot golden smoke
        run: make smoke-ui-goldens

      - name: Start menu screenshot smoke
        run: make smoke-start-menu

      - name: Upload UI failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-artifacts
          path: target/smoke-artifacts/**
          if-no-files-found: ignore

  usb-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Rust toolchain
        run: rustup show

      - name: USB init smoke
        run: make smoke-usb-init

      - name: Upload USB failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: usb-smoke-artifacts
          path: target/smoke-artifacts/**
          if-no-files-found: ignore

  qemu-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        target:
          - smoke-lowmem
          - smoke-smp2
          - smoke-vga-cirrus
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      - name: Rust toolchain
        run: rustup show

      - name: QEMU matrix ${{ matrix.target }}
        run: make ${{ matrix.target }}

      - name: Upload matrix failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-matrix-${{ matrix.target }}-artifacts
          path: target/smoke-artifacts/**
          if-no-files-found: ignore
